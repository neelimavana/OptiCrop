<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OptiCrop | Find Your Crop</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark bg-success px-4">
    <a class="navbar-brand fw-bold" href="/">OptiCrop</a>
    <div class="navbar-nav">
      <a class="nav-link text-white" href="/">Home</a>
      <a class="nav-link text-white" href="/about">About</a>
      <a class="nav-link text-white" href="/find-your-crop">Find Your Crop</a>
    </div>
  </nav>
  <div class="container mt-5">
    <h2 class="mb-2">Find Your Crop</h2>
    <p class="text-muted">Enter your soil and climate conditions to get a crop recommendation.</p>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form action="/find-your-crop" method="POST" class="row g-3 mt-3">
      <div class="col-md-4"><label class="form-label">Nitrogen (N)</label><input type="number" step="any" name="N" class="form-control" required></div>
      <div class="col-md-4"><label class="form-label">Phosphorous (P)</label><input type="number" step="any" name="P" class="form-control" required></div>
      <div class="col-md-4"><label class="form-label">Potassium (K)</label><input type="number" step="any" name="K" class="form-control" required></div>
      <div class="col-md-4"><label class="form-label">Temperature (&deg;C)</label><input type="number" step="any" name="temperature" class="form-control" required></div>
      <div class="col-md-4"><label class="form-label">Humidity (%)</label><input type="number" step="any" name="humidity" class="form-control" required></div>
      <div class="col-md-4"><label class="form-label">Soil pH</label><input type="number" step="any" name="ph" class="form-control" required></div>
      <div class="col-md-4"><label class="form-label">Rainfall (mm)</label><input type="number" step="any" name="rainfall" class="form-control" required></div>
      <div class="col-12 mt-3"><button type="submit" class="btn btn-success px-4">Predict</button></div>
    </form>
    {% if prediction %}
      <div class="card mt-4 p-4 shadow-sm">
        <h4>Recommended crop: <span class="text-success">{{ prediction }}</span></h4>
      </div>
    {% endif %}
  </div>
</body>
</html>
